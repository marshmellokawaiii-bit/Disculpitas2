<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>¿Me perdonas?</title>

  <style>

    body{
      margin:0;
      padding:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background-color:#ffd6e7;
      font-family: Arial, sans-serif;
    }

    .contenedor{
      text-align:center;
    }

    h1{
      color:black;
      font-size:50px;
      margin-bottom:20px;
    }

    img{
      width:300px;
      max-width:90%;
      border-radius:20px;
      margin-bottom:25px;
    }

    .botones{
      display:flex;
      justify-content:center;
      gap:20px;
    }

    button{
      border:none;
      padding:15px 35px;
      font-size:20px;
      color:white;
      border-radius:12px;
      cursor:pointer;
      transition:0.3s;
    }

    .si{
      background-color:green;
    }

    .si:hover{
      transform:scale(1.1);
    }

    .no{
      background-color:red;
    }

    .no:hover{
      transform:scale(1.1);
    }

    #mensaje{
      margin-top:20px;
      font-size:35px;
      color:black;
      font-weight:bold;
    }

  </style>
</head>

<body>

  <div class="contenedor">

    <!-- PREGUNTA PRINCIPAL -->
    <h1>¿Me perdonas?</h1>

    <!-- IMAGEN PRINCIPAL -->
    <!-- CAMBIA ESTE LINK -->
    <img 
      id="imagen"
      src="https://i.pinimg.com/736x/c8/a1/c8/c8a1c8c8a2b085e1e8d3c574c5672bfe.jpg"
      alt="imagen bonita"
    >

    <div class="botones">

      <!-- BOTÓN SÍ -->
      <button class="si" onclick="presionoSi()">
        Sí
      </button>

      <!-- BOTÓN NO -->
      <button class="no" onclick="cambiarNo()">
        No
      </button>

    </div>

    <!-- MENSAJE DE ABAJO -->
    <div id="mensaje"></div>

  </div>

  <script>

    // CONTADOR DE ETAPAS DEL BOTÓN NO
    let etapaNo = 0;

    function cambiarNo(){

      const botonNo = document.querySelector(".no");
      const imagen = document.getElementById("imagen");

      etapaNo++;

      // =========================================
      // PRIMER CLICK EN "NO"
      // =========================================
      if(etapaNo == 1){

        // TEXTO DEL BOTÓN
        botonNo.innerText = "¿Deberitas?";

        // CAMBIAR IMAGEN
        imagen.src = "PON_AQUI_LA_IMAGEN_1";

      }

      // =========================================
      // SEGUNDO CLICK EN "NO"
      // =========================================
      else if(etapaNo == 2){

        // TEXTO DEL BOTÓN
        botonNo.innerText = "¿En verdad harías esa diablura?";

        // CAMBIAR IMAGEN
        imagen.src = "https://i.pinimg.com/1200x/58/20/3d/58203d6bdcbfed932a7adacb25ee1324.jpg";

      }

      // =========================================
      // TERCER CLICK EN "NO"
      // =========================================
      else if(etapaNo == 3){

        // TEXTO DEL BOTÓN
        botonNo.innerText = "Es enserio?";

        // CAMBIAR IMAGEN
        imagen.src = "https://i.ytimg.com/vi/lyyoXRPtoB8/mqdefault.jpg";

      }

      // =========================================
      // CUARTO CLICK EN "NO"
      // =========================================
      else if(etapaNo == 4){

        // TEXTO DEL BOTÓN
        botonNo.innerText = "Esta bien ntp";

        // CAMBIAR IMAGEN
        imagen.src = "https://pbs.twimg.com/media/ExDdUThVIAMLTx5.jpg";

      }

    }

    // =========================================
    // CUANDO PRESIONAN "SÍ"
    // =========================================
    function presionoSi(){

      // CAMBIAR IMAGEN
      document.getElementById("imagen").src =
      "https://media1.tenor.com/m/YP0XYJlUqKIAAAAd/pibble-cute-dog.gif";

      // MENSAJE FINAL
      document.getElementById("mensaje").innerText =
      "Yeiiii";

    }

  </script>

</body>
</html>
